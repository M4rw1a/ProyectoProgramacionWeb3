<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Aulas - Bienvenidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .bg-dots {
            background-color: #6366f1;
            background-image: radial-gradient(#ffffff25 2px, transparent 2px);
            background-size: 30px 30px;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .text-yellow { color: #fbbf24; }
        .btn-pill { border-radius: 50px; padding: 12px 35px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="bg-dots">
        <div class="container text-center">
            <h1 class="display-4 fw-bold text-white">SMART <span class="text-yellow">AULAS</span></h1>
            <p class="lead text-white mt-4 mb-5">Sistema integral para tu institución educativa.</p>
            
            <button type="button" class="btn btn-light btn-pill btn-lg shadow" data-bs-toggle="modal" data-bs-target="#loginModal">
                Iniciar Sesión
            </button>
        </div>
    </div>

    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Iniciar Sesión</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="mensaje-login"></div>
                    <form id="form-login">
                        <div class="mb-3">
                            <label class="form-label">Usuario</label>
                            <input type="text" class="form-control" id="username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Ingresar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userVal = document.getElementById('username').value;
            
            const res = await fetch('/api/token/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: userVal,
                    password: document.getElementById('password').value
                })
            });

            if(res.ok) {
                const data = await res.json();
                localStorage.setItem('access_token', data.access);
                localStorage.setItem('username', userVal);
                
                if (userVal.toLowerCase() === 'iver' || userVal.toLowerCase() === 'admin') {
                    localStorage.setItem('is_admin', 'true');
                } else {
                    localStorage.setItem('is_admin', 'false');
                }
                
                window.location.href = '/dashboard/';
            } else {
                document.getElementById('mensaje-login').innerHTML = '<div class="alert alert-danger">Error de credenciales</div>';
            }
        });
    </script>
    <script>
    document.getElementById('form-login').addEventListener('submit', async (e) => {
        e.preventDefault();
        console.log("¡Botón presionado!"); // Si esto no sale en F12 -> Console, el ID del form está mal.

        const userVal = document.getElementById('username').value;
        const passVal = document.getElementById('password').value;

        try {
            const res = await fetch('/api/token/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: userVal, password: passVal })
            });

            if(res.ok) {
                const data = await res.json();
                localStorage.setItem('access_token', data.access);
                localStorage.setItem('username', userVal);
                window.location.href = '/dashboard/';
            } else {
                document.getElementById('mensaje-login').innerHTML = 
                    '<div class="alert alert-danger">Usuario o contraseña incorrectos</div>';
            }
        } catch (error) {
            console.error("Error de conexión:", error);
            document.getElementById('mensaje-login').innerHTML = 
                '<div class="alert alert-warning">No se pudo conectar con el servidor</div>';
        }
    });
</script>
</body>
</html>
