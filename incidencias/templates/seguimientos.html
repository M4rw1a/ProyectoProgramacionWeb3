<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Smart Aulas - Seguimientos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Smart Aulas</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="/incidencias/">Ver Incidencias</a></li>
                    <li class="nav-item"><a class="nav-link" href="/registrar/">Reportar Incidencia</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/seguimientos/">Seguimientos</a></li>
                    <li class="nav-item">
                         <a class="nav-link text-warning fw-bold" href="/admin/" target="_blank">Panel Admin</a>
                    </li>
                    <li class="nav-item">
                         <a class="nav-link text-danger fw-bold" href="#" onclick="cerrarSesion()">Cerrar Sesión</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h3 class="mb-4 fw-bold">Historial y Seguimientos</h3>
        <div class="row">
            <div class="col-md-5 mb-3">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-dark text-white fw-bold">Seleccionar Incidencia</div>
                    <div class="list-group list-group-flush" id="lista-incidencias">
                        <div class="p-3 text-muted">Cargando incidencias...</div>
                    </div>
                </div>
            </div>
            <div class="col-md-7">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-secondary text-white fw-bold" id="titulo-seguimiento">Comentarios Técnicos</div>
                    <div class="card-body bg-white" id="cuerpo-seguimiento" style="min-height: 200px;">
                        <p class="text-muted text-center mt-4">Haz clic en una incidencia de la izquierda para ver su historial.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const lista = document.getElementById('lista-incidencias');
            try {
                const res = await fetch('/api/incidencias/');
                const incidencias = await res.json();
                lista.innerHTML = '';
                incidencias.forEach(i => {
                    const btn = document.createElement('button');
                    btn.className = "list-group-item list-group-item-action";
                    btn.innerHTML = `<strong>Incidencia #${i.id}</strong> - <span class="badge bg-secondary">${i.estado}</span><br><small class="text-muted">${i.descripcion}</small>`;
                    btn.onclick = () => verHistorial(i.id);
                    lista.appendChild(btn);
                });
            } catch (e) { console.error(e); }
        });

        async function verHistorial(id) {
            document.getElementById('titulo-seguimiento').innerText = `Historial de Incidencia #${id}`;
            const cuerpo = document.getElementById('cuerpo-seguimiento');
            cuerpo.innerHTML = '<p class="text-center mt-4">Cargando...</p>';
            
            try {
                const res = await fetch('/api/seguimientos/');
                const seguimientos = await res.json();
                const filtrados = seguimientos.filter(s => s.incidencia === id);

                if(filtrados.length === 0) {
                    cuerpo.innerHTML = '<p class="text-muted text-center mt-4">No hay comentarios registrados para esta incidencia.</p>';
                    return;
                }

                cuerpo.innerHTML = '';
                filtrados.forEach(s => {
                    cuerpo.innerHTML += `
                        <div class="alert alert-light border shadow-sm mb-2">
                            <p class="mb-1">${s.comentario}</p>
                            <small class="text-muted"><strong>Fecha:</strong> ${new Date(s.fecha).toLocaleString()}</small>
                        </div>
                    `;
                });
            } catch (e) { console.error(e); }
        }
    </script>
    <script>
    function cerrarSesion() {
        localStorage.removeItem('access_token');
        window.location.href = '/login/';
    }
    </script>
</body>
</html>
