<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Smart Aulas - Reportar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        body { background-color: #f4f6f9; }
        .form-control:focus, .form-select:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="/">
                <i class="bi bi-building me-1"></i> Smart Aulas
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" href="#" onclick="irAInicio()">Inicio</a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="/incidencias/">Ver Incidencias</a></li>
                    <li class="nav-item"><a class="nav-link active fw-bold text-primary" href="/registrar/">Reportar Incidencia</a></li>
                    <li class="nav-item"><a class="nav-link" href="/seguimientos/">Seguimientos</a></li>
                    
                    <li class="nav-item d-flex align-items-center me-3 ms-4 border-start ps-3">
                        <span class="text-secondary"><i class="bi bi-person-circle me-1"></i> <strong id="nombre-usuario" class="text-dark"></strong></span>
                    </li>

                    <li class="nav-item me-2" id="btn-admin" style="display: none;">
                        <a class="btn btn-dark btn-sm fw-bold" href="/admin/">
                            <i class="bi bi-gear-fill me-1"></i> Panel Admin
                        </a>
                    </li>
                    <li class="nav-item">
                         <button class="btn btn-outline-danger btn-sm fw-bold" onclick="cerrarSesion()">
                            <i class="bi bi-box-arrow-right me-1"></i> Salir
                         </button>
                    </li>            
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5" style="max-width: 650px;">
        
        <div class="text-center mb-4">
            <i class="bi bi-clipboard2-pulse text-primary" style="font-size: 3rem;"></i>
            <h3 class="fw-bold text-dark mt-2">Nueva Incidencia</h3>
            <p class="text-muted">Por favor, detalla el problema encontrado en el aula.</p>
        </div>

        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-4 p-md-5">
                
                <div id="mensaje"></div>
                
                <form id="form-registro">
                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark"><i class="bi bi-door-open me-1 text-secondary"></i> Seleccione el Aula</label>
                        <select class="form-select bg-light border-1 py-2" id="aula" required>
                            <option value="">Cargando aulas disponibles...</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark"><i class="bi bi-tags me-1 text-secondary"></i> Categoría del Problema</label>
                        <select class="form-select bg-light border-1 py-2" id="tipo" required>
                            <option value="" selected disabled>Elija una categoría...</option>
                            <option value="PROYECTOR">Proyector / Audiovisual</option>
                            <option value="COMPUTADORA">Computadora / Hardware</option>
                            <option value="ILUMINACION">Iluminación / Eléctrico</option>
                            <option value="MOBILIARIO">Mobiliario / Estructura</option>
                            <option value="CONECTIVIDAD">Conectividad / Red</option>
                            <option value="OTRO">Otro problema</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark"><i class="bi bi-card-text me-1 text-secondary"></i> Descripción Detallada</label>
                        <textarea class="form-control bg-light border-1" id="descripcion" rows="4" placeholder="Describa brevemente qué no funciona y si notó alguna causa aparente..." required></textarea>
                    </div>

                    <hr class="my-4 text-muted">

                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-sm d-flex justify-content-center align-items-center">
                        <i class="bi bi-send-fill me-2"></i> Enviar Reporte de Incidencia
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // 1. VIGILANTE: Seguridad de sesión
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('access_token');
            if (!token) {
                window.location.href = '/'; 
            }

            // Cargar datos de usuario
            const user = localStorage.getItem('username') || 'Invitado';
            document.getElementById('nombre-usuario').innerText = user;

            const isAdmin = localStorage.getItem('is_admin');
            if (isAdmin === 'true') {
                document.getElementById('btn-admin').style.display = 'block';
            }

            // Cargar aulas en el select
            try {
                const res = await fetch('/api/aulas/');
                const aulas = await res.json();
                const selectAula = document.getElementById('aula');
                selectAula.innerHTML = '<option value="" selected disabled>Seleccione un aula de la lista...</option>';
                aulas.forEach(a => {
                    selectAula.innerHTML += `<option value="${a.id}">Aula ${a.codigo} - ${a.tipo}</option>`;
                });
            } catch (e) { 
                console.error(e);
                document.getElementById('aula').innerHTML = '<option value="">Error al cargar aulas.</option>';
            }
        });

        // 2. Navegación Inteligente
        function irAInicio() {
            const token = localStorage.getItem('access_token');
            window.location.href = token ? '/dashboard/' : '/';
        }

        // 3. Cierre de Sesión Unificado
        function cerrarSesion() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('username');
            localStorage.removeItem('is_admin');
            window.location.href = '/';
        }

        // 4. Envío del formulario
        document.getElementById('form-registro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('access_token');
            const btnSubmit = e.target.querySelector('button[type="submit"]');
            
            // UX: Desactivar botón mientras carga
            const btnOriginalText = btnSubmit.innerHTML;
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Procesando...';
            
            const payload = {
                aula: document.getElementById('aula').value,
                tipo_problema: document.getElementById('tipo').value,
                descripcion: document.getElementById('descripcion').value,
                usuario: 1, // Nota: Idealmente deberías sacar esto del payload del JWT decodificado en un futuro
                estado: 'PENDIENTE'
            };

            try {
                const res = await fetch('/api/incidencias/', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    document.getElementById('mensaje').innerHTML = `
                        <div class="alert alert-success d-flex align-items-center mb-4" role="alert">
                            <i class="bi bi-check-circle-fill fs-4 me-3"></i>
                            <div><strong>¡Éxito!</strong> La incidencia ha sido reportada correctamente.</div>
                        </div>`;
                    document.getElementById('form-registro').reset();
                } else {
                    const err = await res.json();
                    document.getElementById('mensaje').innerHTML = `
                        <div class="alert alert-danger d-flex align-items-center mb-4" role="alert">
                            <i class="bi bi-exclamation-triangle-fill fs-4 me-3"></i>
                            <div><strong>Error:</strong> ${JSON.stringify(err)}</div>
                        </div>`;
                }
            } catch (e) { 
                console.error(e);
                document.getElementById('mensaje').innerHTML = `
                    <div class="alert alert-danger d-flex align-items-center mb-4" role="alert">
                        <i class="bi bi-x-octagon-fill fs-4 me-3"></i>
                        <div><strong>Error de conexión.</strong> Por favor intente más tarde.</div>
                    </div>`;
            } finally {
                // UX: Restaurar botón
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = btnOriginalText;
                
                // UX: Scroll hacia arriba para ver el mensaje
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });
    </script>
</body>
</html>
