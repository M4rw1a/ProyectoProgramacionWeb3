<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Smart Aulas - Reportar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Smart Aulas</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="irAInicio()">Inicio</a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="/incidencias/">Ver Incidencias</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/registrar/">Reportar Incidencia</a></li>
                    <li class="nav-item"><a class="nav-link" href="/seguimientos/">Seguimientos</a></li>
                    
                    <li class="nav-item d-flex align-items-center me-3 ms-3">
                        <span class="text-white">👤 <strong id="nombre-usuario" class="text-info"></strong></span>
                    </li>

                    <li class="nav-item" id="btn-admin" style="display: none;">
                        <a class="nav-link text-warning fw-bold" href="/admin/">Panel Admin</a>
                    </li>
                    <li class="nav-item">
                         <a class="nav-link text-danger fw-bold" href="#" onclick="cerrarSesion()">Cerrar Sesión</a>
                    </li>            
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white p-3">
                <h4 class="mb-0">Registrar Nueva Incidencia</h4>
            </div>
            <div class="card-body p-4">
                <div id="mensaje"></div>
                <form id="form-registro">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Seleccione el Aula</label>
                        <select class="form-select" id="aula" required>
                            <option value="">Cargando aulas...</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tipo de Problema</label>
                        <select class="form-select" id="tipo" required>
                            <option value="PROYECTOR">Proyector</option>
                            <option value="COMPUTADORA">Computadora</option>
                            <option value="ILUMINACION">Iluminación</option>
                            <option value="MOBILIARIO">Mobiliario</option>
                            <option value="CONECTIVIDAD">Conectividad</option>
                            <option value="OTRO">Otro</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Descripción detallada</label>
                        <textarea class="form-control" id="descripcion" rows="4" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Enviar Reporte</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // 1. VIGILANTE: Seguridad de sesión
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('access_token');
            if (!token) {
                window.location.href = '/'; 
            }

            // Cargar datos de usuario
            const user = localStorage.getItem('username') || 'Invitado';
            document.getElementById('nombre-usuario').innerText = user;

            const isAdmin = localStorage.getItem('is_admin');
            if (isAdmin === 'true') {
                document.getElementById('btn-admin').style.display = 'block';
            }

            // Cargar aulas
            try {
                const res = await fetch('/api/aulas/');
                const aulas = await res.json();
                const selectAula = document.getElementById('aula');
                selectAula.innerHTML = '<option value="">Seleccione un aula...</option>';
                aulas.forEach(a => {
                    selectAula.innerHTML += `<option value="${a.id}">${a.codigo} (${a.tipo})</option>`;
                });
            } catch (e) { console.error(e); }
        });

        // 2. Navegación Inteligente
        function irAInicio() {
            const token = localStorage.getItem('access_token');
            window.location.href = token ? '/dashboard/' : '/';
        }

        // 3. Cierre de Sesión Unificado
        function cerrarSesion() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('username');
            localStorage.removeItem('is_admin');
            window.location.href = '/';
        }

        // 4. Envío del formulario
        document.getElementById('form-registro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('access_token');
            
            const payload = {
                aula: document.getElementById('aula').value,
                tipo_problema: document.getElementById('tipo').value,
                descripcion: document.getElementById('descripcion').value,
                usuario: 1,
                estado: 'PENDIENTE'
            };

            try {
                const res = await fetch('/api/incidencias/', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    document.getElementById('mensaje').innerHTML = '<div class="alert alert-success">¡Incidencia reportada correctamente!</div>';
                    document.getElementById('form-registro').reset();
                } else {
                    const err = await res.json();
                    document.getElementById('mensaje').innerHTML = `<div class="alert alert-danger">Error: ${JSON.stringify(err)}</div>`;
                }
            } catch (e) { console.error(e); }
        });
    </script>
</body>
</html>
