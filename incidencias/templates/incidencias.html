<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Smart Aulas - Listado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        body { background-color: #f4f6f9; }
        /* Suaviza los bordes de la tabla dentro de la tarjeta */
        .table-wrapper { border-radius: 0.5rem; overflow: hidden; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="/">
                <i class="bi bi-building me-1"></i> Smart Aulas
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" href="#" onclick="irAInicio()">Inicio</a>
                    </li>
                    <li class="nav-item"><a class="nav-link active fw-bold text-primary" href="/incidencias/">Ver Incidencias</a></li>
                    <li class="nav-item"><a class="nav-link" href="/registrar/">Reportar Incidencia</a></li>
                    <li class="nav-item"><a class="nav-link" href="/seguimientos/">Seguimientos</a></li>
                    
                    <li class="nav-item d-flex align-items-center me-3 ms-4 border-start ps-3">
                        <span class="text-secondary"><i class="bi bi-person-circle me-1"></i> <strong id="nombre-usuario" class="text-dark"></strong></span>
                    </li>

                    <li class="nav-item me-2" id="btn-admin" style="display: none;">
                        <a class="btn btn-dark btn-sm fw-bold" href="/admin/">
                            <i class="bi bi-gear-fill me-1"></i> Panel Admin
                        </a>
                    </li>
                    <li class="nav-item">
                         <button class="btn btn-outline-danger btn-sm fw-bold" onclick="cerrarSesion()">
                            <i class="bi bi-box-arrow-right me-1"></i> Salir
                         </button>
                    </li>            
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="d-flex align-items-center mb-4">
            <i class="bi bi-display fs-2 text-primary me-3"></i>
            <div>
                <h3 class="mb-0 fw-bold text-dark">Monitor de Incidencias</h3>
                <p class="text-muted mb-0">Gestión y filtrado de reportes activos e históricos.</p>
            </div>
        </div>
        
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-muted text-uppercase"><i class="bi bi-funnel-fill me-1"></i> Filtrar por Tipo</label>
                    <select class="form-select bg-light border-0" id="filtro-tipo">
                        <option value="">Todos los tipos</option>
                        <option value="PROYECTOR">Proyector</option>
                        <option value="COMPUTADORA">Computadora</option>
                        <option value="CONECTIVIDAD">Conectividad</option>
                    </select>
                </div>
                <div class="col-md-8 d-flex flex-wrap justify-content-md-end gap-2">
                    <button class="btn btn-light border shadow-sm fw-semibold" onclick="cargarRuta('/api/incidencias/')">
                        <i class="bi bi-collection text-secondary me-1"></i> Mostrar Todas
                    </button>
                    <button class="btn btn-danger shadow-sm fw-semibold" onclick="cargarRuta('/api/consultas/pendientes/')">
                        <i class="bi bi-exclamation-octagon me-1"></i> Ver Pendientes
                    </button>
                    <button class="btn btn-success shadow-sm fw-semibold" onclick="cargarRuta('/api/consultas/resueltas/')">
                        <i class="bi bi-check2-circle me-1"></i> Ver Resueltas
                    </button>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm table-wrapper mb-5">
            <div class="table-responsive bg-white">
                <table class="table table-hover align-middle mb-0 border-0">
                    <thead class="table-dark">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Aula ID</th>
                            <th>Tipo Problema</th>
                            <th>Descripción</th>
                            <th class="pe-4">Estado</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-cuerpo" class="border-top-0">
                        <tr><td colspan="5" class="text-center text-muted py-5"><div class="spinner-border text-primary spinner-border-sm me-2" role="status"></div> Cargando registros...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 1. VIGILANTE: Si no hay token, fuera
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('access_token');
            if (!token) {
                window.location.href = '/'; 
            }

            // Cargar datos de usuario
            const user = localStorage.getItem('username') || 'Invitado';
            document.getElementById('nombre-usuario').innerText = user;

            const isAdmin = localStorage.getItem('is_admin');
            if (isAdmin === 'true') {
                document.getElementById('btn-admin').style.display = 'block';
            }

            cargarRuta('/api/incidencias/');
        });

        // 2. Navegación Inteligente
        function irAInicio() {
            const token = localStorage.getItem('access_token');
            window.location.href = token ? '/dashboard/' : '/';
        }

        // 3. Cierre de Sesión Unificado
        function cerrarSesion() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('username');
            localStorage.removeItem('is_admin');
            window.location.href = '/';
        }

        // 4. Lógica de tabla
        document.getElementById('filtro-tipo').addEventListener('change', (e) => {
            if(e.target.value) {
                cargarRuta(`/api/consultas/tipo/${e.target.value}/`);
            } else {
                cargarRuta('/api/incidencias/'); // Vuelve a cargar todas si desmarca el filtro
            }
        });

        async function cargarRuta(url) {
            const tbody = document.getElementById('tabla-cuerpo');
            tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-5"><div class="spinner-border text-primary spinner-border-sm me-2" role="status"></div> Consultando base de datos...</td></tr>`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                tbody.innerHTML = '';

                if(data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-5"><i class="bi bi-inbox fs-2 d-block mb-2 text-light"></i> No se encontraron registros.</td></tr>`;
                    return;
                }

                data.forEach(inc => {
                    let badgeColor = inc.estado === 'PENDIENTE' ? 'bg-danger' : (inc.estado === 'EN_PROCESO' ? 'bg-warning text-dark' : 'bg-success');
                    tbody.innerHTML += `
                        <tr>
                            <td class="ps-4 text-muted">#${inc.id}</td>
                            <td class="fw-bold text-dark"><i class="bi bi-door-open me-1 text-secondary"></i> Aula ${inc.aula}</td>
                            <td><span class="badge bg-light text-dark border"><i class="bi bi-tag-fill me-1 text-secondary"></i> ${inc.tipo_problema}</span></td>
                            <td class="text-secondary">${inc.descripcion}</td>
                            <td class="pe-4"><span class="badge ${badgeColor} px-3 py-2 rounded-pill shadow-sm">${inc.estado}</span></td>
                        </tr>
                    `;
                });
            } catch (err) { 
                console.error(err); 
                tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger py-4"><i class="bi bi-exclamation-triangle me-1"></i> Error al cargar los datos.</td></tr>`;
            }
        }
    </script>
</body>
</html>
