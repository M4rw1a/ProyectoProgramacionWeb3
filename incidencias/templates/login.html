<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Smart Aulas - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Smart Aulas</a>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 400px;">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white text-center p-3">
                <h4 class="mb-0">Iniciar Sesión</h4>
            </div>
            <div class="card-body p-4">
                <div id="mensaje-login"></div>
                <form id="form-login">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Usuario</label>
                        <input type="text" class="form-control" id="username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Contraseña</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Ingresar</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                // Se conecta a la ruta JWT que configuró el Integrante 2
                const res = await fetch('/api/token/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    const data = await res.json();
                    // Guardamos el token en el navegador
                    localStorage.setItem('access_token', data.access);
                    window.location.href = '/'; // Redirige al inicio
                } else {
                    document.getElementById('mensaje-login').innerHTML = '<div class="alert alert-danger">Credenciales incorrectas.</div>';
                }
            } catch (error) {
                console.error(error);
            }
        });
    </script>
</body>
</html>
