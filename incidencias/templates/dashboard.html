<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Smart Aulas - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Smart Aulas</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
    <a class="nav-link active" href="#" onclick="irAInicio()">Inicio</a>
</li>
                    <li class="nav-item"><a class="nav-link" href="/incidencias/">Ver Incidencias</a></li>
                    <li class="nav-item"><a class="nav-link" href="/registrar/">Reportar Incidencia</a></li>
                    <li class="nav-item"><a class="nav-link" href="/seguimientos/">Seguimientos</a></li>
                    
                    <li class="nav-item d-flex align-items-center me-3 ms-3">
                        <span class="text-white">👤 <strong id="nombre-usuario" class="text-info"></strong></span>
                    </li>

                    <li class="nav-item" id="btn-admin" style="display: none;">
                        <a class="nav-link text-warning fw-bold" href="/admin/">Panel Admin</a>
                    </li>
                    <li class="nav-item">
                         <a class="nav-link text-danger fw-bold" href="#" onclick="cerrarSesion()">Cerrar Sesión</a>
                    </li>            
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4 fw-bold text-center">Resumen Operativo de Aulas</h2>
        <div class="row text-center mt-4">
            <div class="col-md-3">
                <div class="card border-0 shadow-sm bg-primary text-white h-100">
                    <div class="card-body py-5">
                        <h5>Total Reportes</h5>
                        <h1 class="display-3 fw-bold" id="stat-total">-</h1>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm bg-danger text-white h-100">
                    <div class="card-body py-5">
                        <h5>Pendientes</h5>
                        <h1 class="display-3 fw-bold" id="stat-pendientes">-</h1>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm bg-warning text-dark h-100">
                    <div class="card-body py-5">
                        <h5>En Proceso</h5>
                        <h1 class="display-3 fw-bold" id="stat-proceso">-</h1>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm bg-success text-white h-100">
                    <div class="card-body py-5">
                        <h5>Resueltas</h5>
                        <h1 class="display-3 fw-bold" id="stat-resueltas">-</h1>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // --- MAGIA VISUAL: Cargar nombre de usuario y verificar Admin ---
            const user = localStorage.getItem('username') || 'Invitado';
            document.getElementById('nombre-usuario').innerText = user;

            const isAdmin = localStorage.getItem('is_admin');
            if (isAdmin === 'true') {
                document.getElementById('btn-admin').style.display = 'block';
            }
            // --------------------------------------------------------------

            // Cargar estadísticas
            try {
                // Como las rutas de la API de Django suelen requerir la barra final
                const res = await fetch('/api/consultas/estadisticas/');
                if(res.ok){
                    const data = await res.json();
                    document.getElementById('stat-total').innerText = data.total;
                    document.getElementById('stat-pendientes').innerText = data.pendientes;
                    document.getElementById('stat-proceso').innerText = data.en_proceso;
                    document.getElementById('stat-resueltas').innerText = data.resueltas;
                }
            } catch (error) { console.error("Error al cargar stats:", error); }
        });
    </script>
    <script>
    function cerrarSesion() {
        // Limpiamos absolutamente todo al salir
        localStorage.removeItem('access_token');
        localStorage.removeItem('username');
        localStorage.removeItem('is_admin');
        
        // CORRECCIÓN: Redirigir a la raíz '/' donde está tu Landing/Login
        window.location.href = '/'; 
    }
</script>
<script>
    function irAInicio() {
        const token = localStorage.getItem('access_token');
        
        // Si hay token, estamos logueados -> Vamos al Dashboard
        if (token) {
            window.location.href = '/dashboard/'; // Asegúrate de que esta sea la ruta de tu dashboard
        } else {
            // Si no hay token -> Vamos a la Landing Page (Login)
            window.location.href = '/';
        }
    }
</script>
</body>
</html>
